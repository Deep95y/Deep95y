name: Generate Profile Assets

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Deep95y
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate GitHub trophies
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: username=Deep95y&theme=tokyonight&no-frame=true&column=4&margin-w=10&margin-h=10
          path: output/github-profile-trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: update profile snake and trophy assets"
          git push
